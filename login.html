<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>I-SHARK | Pilot Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00113a",
                        "primary-container": "#002366",
                        "secondary": "#545f72",
                        "surface": "#f7fafc",
                        "surface-container-low": "#f1f4f6",
                    },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .kinetic-gradient { background: linear-gradient(135deg, #00113a 0%, #002366 100%); }
        .ambient-shadow { box-shadow: 0 20px 40px rgba(0, 17, 58, 0.1); }
    </style>
</head>
<body class="bg-surface font-body min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-[2.5rem] p-12 text-center ambient-shadow max-w-md w-full border border-slate-50">
        <div class="w-20 h-20 kinetic-gradient rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-xl shadow-primary/20">
            <span class="material-symbols-outlined text-white text-4xl">fingerprint</span>
        </div>
        
        <h1 class="font-headline font-black text-3xl text-primary mb-2">Pilot Access</h1>
        <p class="text-xs font-bold text-secondary uppercase tracking-[0.2em] mb-10">I-SHARK Central Intelligence</p>

        <div class="space-y-4 mb-8">
            <input id="email" type="email" placeholder="Pilot Email" class="w-full bg-surface-container-low border-none rounded-2xl p-5 text-sm focus:ring-2 focus:ring-primary transition-all outline-none">
            <input id="password" type="password" placeholder="Access Key" class="w-full bg-surface-container-low border-none rounded-2xl p-5 text-sm focus:ring-2 focus:ring-primary transition-all outline-none">
        </div>

        <div class="flex flex-col gap-4">
            <button id="login-btn" class="w-full kinetic-gradient text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-primary/10 active:scale-95 transition-all">Authenticate</button>
            <button id="signup-btn" class="text-primary font-bold text-[10px] uppercase tracking-widest hover:underline opacity-60 hover:opacity-100 transition-opacity">Request New Pilot Credentials</button>
        </div>
        
        <div id="status-msg" class="mt-6 text-[10px] font-bold uppercase tracking-widest hidden"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://atbjezjqjikloqgfvurz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0YmplempxamlrbG9xZ2Z2dXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4MDUsImV4cCI6MjA5MDQ2NTgwNX0.lj0Oumu8e63Q81bxvZ57-ALGaAP6IfIfCDBkqwXyvxM'
        );

        const emailInp = document.getElementById('email');
        const passInp = document.getElementById('password');
        const statusMsg = document.getElementById('status-msg');

        function showStatus(text, isError = true) {
            statusMsg.innerText = text;
            statusMsg.className = `mt-6 text-[10px] font-bold uppercase tracking-widest ${isError ? 'text-red-500' : 'text-green-500'}`;
            statusMsg.classList.remove('hidden');
        }

        document.getElementById('login-btn').onclick = async () => {
            statusMsg.classList.add('hidden');
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: emailInp.value,
                password: passInp.value
            });
            if (error) return showStatus(error.message);
            
            showStatus("Access Granted. Redirecting...", false);
            setTimeout(() => window.location.href = 'index.html', 1000);
        };

        document.getElementById('signup-btn').onclick = async () => {
            const { data, error } = await _supabase.auth.signUp({
                email: emailInp.value,
                password: passInp.value
            });
            if (error) return showStatus(error.message);
            showStatus("Pilot Account Created. Please Authenticate.", false);
        };
    </script>
</body>
</html>
