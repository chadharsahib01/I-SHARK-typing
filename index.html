<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>I-SHARK Kinetic | Surgical V3.0 Apex</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00113a",
                        "primary-dark": "#0a192f",
                        "secondary": "#545f72",
                        "surface": "#f7fafc",
                        "surface-dark": "#020617",
                        "accent": "#7afbb1"
                    },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "mono": ["JetBrains Mono"] },
                },
            },
        }
    </script>
    <style>
        /* 1. LAYOUT & SPACING */
        #typing-container-wrapper { position: relative; overflow: hidden; }
        #typing-container {
            display: flex; flex-wrap: wrap; gap: 0.6em; 
            align-content: flex-start; line-height: 1.6; font-size: 1.5rem; min-height: 250px;
        }
        .word { display: flex; position: relative; }
        .letter { position: relative; display: inline-block; transition: color 0.1s; z-index: 5; }

        /* 2. THE APEX CARET */
        #caret {
            position: absolute; width: 2px; height: 1.5em; background-color: #00113a;
            transition: all 0.08s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(0, 17, 58, 0.4); z-index: 100; pointer-events: none;
            left: 0; top: 0; display: none;
        }
        .dark #caret { background-color: #7afbb1; box-shadow: 0 0 15px #7afbb1; }

        /* 3. KINETIC PARTICLES */
        .particle {
            position: absolute; width: 4px; height: 4px; pointer-events: none;
            border-radius: 1px; z-index: 10; animation: explode 0.5s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* 4. SURGICAL COLORS */
        .correct { color: #00113a !important; font-weight: 600; }
        .dark .correct { color: #f8fafc !important; }
        .incorrect { color: white !important; background-color: #93000a; border-radius: 2px; }
        .pending { color: #cbd5e1; }
        .dark .pending { color: #334155; }

        /* 5. UI BLACKOUT */
        aside, header, .stats-grid { transition: opacity 0.8s ease; }
        .is-typing aside, .is-typing header, .is-typing .stats-grid { opacity: 0.01; pointer-events: none; }
        .dark body { background-color: #020617; color: #f8fafc; }
        .dark aside, .dark .bg-white { background-color: #0f172a; border-color: #1e293b; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden transition-colors duration-500">

    <aside class="h-screen w-64 fixed left-0 top-0 z-40 bg-white flex flex-col p-6 gap-4 font-headline border-r border-slate-100">
        <div class="mb-10 flex items-center gap-3">
            <div class="w-10 h-10 bg-primary dark:bg-primary-dark rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-white">tsunami</span>
            </div>
            <span class="text-xl font-black italic tracking-tighter text-primary dark:text-white">I-SHARK</span>
        </div>
        <button onclick="toggleDarkMode()" class="flex items-center gap-3 p-3 w-full hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-all group">
            <span class="material-symbols-outlined dark:text-white">dark_mode</span>
            <span class="text-xs font-bold uppercase tracking-widest dark:text-white">Switch Mode</span>
        </button>
        <div class="mt-auto flex flex-col gap-2">
            <div id="admin-gate" class="hidden border-t border-slate-100 dark:border-slate-800 pt-2">
                <a href="admin.html" class="flex items-center gap-3 p-3 w-full text-primary dark:text-white hover:bg-slate-100 rounded-lg transition-all">
                    <span class="material-symbols-outlined">analytics</span>
                    <span class="text-xs font-bold uppercase tracking-widest">Master Console</span>
                </a>
            </div>
            <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-800 opacity-60">
                <p class="text-[8px] font-black uppercase tracking-[0.15em] text-secondary leading-loose dark:text-slate-400 text-center">
                    Developed by Ali Raza Chadahar<br>
                    Director @ I-SHARK Institute
                </p>
            </div>
        </div>
    </aside>

    <main class="ml-64 min-h-screen">
        <header class="sticky top-0 z-30 glass-header h-20 flex justify-between items-center px-12 border-b border-slate-100 dark:border-slate-800">
            <h1 class="font-headline font-bold text-xl text-primary dark:text-white uppercase tracking-widest">Pilot: <span id="pilot-name">...</span></h1>
            <button id="logout-btn" class="text-red-400 hover:text-red-600 transition-colors">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </header>

        <div class="p-12 max-w-5xl mx-auto space-y-8">
            <div class="stats-grid grid grid-cols-4 gap-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-50 dark:border-slate-800 flex flex-col items-center">
                    <span class="text-[10px] font-bold text-secondary uppercase mb-1">Time</span>
                    <span id="time-log" class="text-4xl font-headline font-black tabular-nums">30</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-50 dark:border-slate-800 flex flex-col items-center">
                    <span class="text-[10px] font-bold text-secondary uppercase mb-1">Accuracy</span>
                    <span id="accuracy-log" class="text-4xl font-headline font-black tabular-nums">100%</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-50 dark:border-slate-800 flex flex-col items-center">
                    <span class="text-[10px] font-bold text-secondary uppercase mb-1">WPM</span>
                    <span id="wpm-log" class="text-4xl font-headline font-black tabular-nums">0</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-50 dark:border-slate-800 flex flex-col items-center">
                    <span class="text-[10px] font-bold text-secondary uppercase mb-1">Best</span>
                    <span id="best-wpm" class="text-4xl font-headline font-black tabular-nums">0</span>
                </div>
            </div>

            <div id="typing-container-wrapper" class="bg-white dark:bg-slate-900/50 rounded-[2.5rem] p-12 border border-slate-100 dark:border-slate-800 shadow-2xl">
                <div id="caret"></div>
                <div id="typing-container" class="font-mono italic"></div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-md p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-12 text-center max-w-sm w-full">
            <h2 class="font-headline font-black text-3xl mb-8 dark:text-white uppercase">Mission Over</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl">
                    <p class="text-[10px] font-bold uppercase mb-1 opacity-50">WPM</p>
                    <p id="final-wpm" class="text-3xl font-black">0</p>
                </div>
                <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl">
                    <p class="text-[10px] font-bold uppercase mb-1 opacity-50">Acc</p>
                    <p id="final-accuracy" class="text-3xl font-black">0%</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full bg-primary dark:bg-white dark:text-primary py-5 rounded-2xl font-black uppercase text-xs tracking-widest text-white">Next Flight (Tab)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://atbjezjqjikloqgfvurz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0YmplempxamlrbG9xZ2Z2dXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4MDUsImV4cCI6MjA5MDQ2NTgwNX0.lj0Oumu8e63Q81bxvZ57-ALGaAP6IfIfCDBkqwXyvxM'
        );

        // --- THE ZEN SOUNDSCAPE (SYNTH) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playCorrectClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function playErrorThud() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            oscillatorFreq = 80;
            osc.frequency.setValueAtTime(oscillatorFreq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        // --- KINETIC PARTICLES ---
        function spawnParticles(x, y) {
            const wrapper = document.getElementById('typing-container-wrapper');
            const color = document.documentElement.classList.contains('dark') ? '#7afbb1' : '#00113a';
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                const dx = (Math.random() - 0.5) * 80;
                const dy = (Math.random() - 0.5) * 80;
                p.style.setProperty('--dx', `${dx}px`);
                p.style.setProperty('--dy', `${dy}px`);
                wrapper.appendChild(p);
                setTimeout(() => p.remove(), 500);
            }
        }

        let currentUser = null, bestWPM = parseInt(localStorage.getItem('ishark_best_wpm')) || 0;
        let wordList = [], currentWordIdx = 0, currentLetterIdx = 0, isTestFinished = false, timerInterval = null, timeRemaining = 30;
        let keystrokes = 0, errors = 0, startTime = null;

        async function checkAuth() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) window.location.href = 'login.html';
            else {
                currentUser = user;
                document.getElementById('pilot-name').innerText = user.email.split('@')[0].toUpperCase();
                document.getElementById('best-wpm').innerText = bestWPM;
                if (user.email === 'hacker.chadhar@gmail.com') document.getElementById('admin-gate').classList.remove('hidden');
            }
        }
        checkAuth();

        const dict = ["the", "be", "to", "of", "and", "a", "in", "that", "have", "it", "for", "not", "on", "with", "he", "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", "she", "or", "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", "out", "if", "about", "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", "no", "just", "him", "know", "take", "people", "into", "year", "your", "good", "some", "could", "them", "see", "other", "than", "then", "now", "look", "only", "come", "its", "over", "think", "also", "back", "after", "use", "two", "how", "our", "work", "first", "well", "way", "even", "new", "want", "because", "any", "these", "give", "day", "most", "us"];

        function loadLesson() {
            const container = document.getElementById('typing-container');
            container.innerHTML = '';
            wordList = [];
            for (let i = 0; i < 60; i++) wordList.push(dict[Math.floor(Math.random() * dict.length)]);
            wordList.forEach((word, wIdx) => {
                const wordDiv = document.createElement('div');
                wordDiv.className = 'word';
                word.split('').forEach((char, lIdx) => {
                    const span = document.createElement('span');
                    span.className = 'letter pending';
                    span.innerText = char;
                    span.id = `w${wIdx}l${lIdx}`;
                    wordDiv.appendChild(span);
                });
                container.appendChild(wordDiv);
            });
            currentWordIdx = 0; currentLetterIdx = 0;
            setTimeout(updateCaret, 100);
        }

        function updateCaret() {
            const caret = document.getElementById('caret');
            const activeLetter = document.getElementById(`w${currentWordIdx}l${currentLetterIdx}`);
            const wrapper = document.getElementById('typing-container-wrapper');
            if (activeLetter) {
                const letterRect = activeLetter.getBoundingClientRect();
                const wrapperRect = wrapper.getBoundingClientRect();
                const x = letterRect.left - wrapperRect.left;
                const y = letterRect.top - wrapperRect.top;
                caret.style.display = 'block';
                caret.style.transform = `translate(${x}px, ${y}px)`;
                return {x, y};
            }
            return null;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') { e.preventDefault(); location.reload(); return; }
            if (isTestFinished) return;

            if (!startTime && e.key.length === 1) {
                startTime = new Date();
                document.body.classList.add('is-typing');
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    document.getElementById('time-log').innerText = timeRemaining;
                    if (timeRemaining <= 0) endTest();
                }, 1000);
            }

            const activeWord = wordList[currentWordIdx];
            const activeSpan = document.getElementById(`w${currentWordIdx}l${currentLetterIdx}`);

            if (e.key === 'Backspace') {
                if (currentLetterIdx > 0) {
                    currentLetterIdx--;
                    document.getElementById(`w${currentWordIdx}l${currentLetterIdx}`).className = 'letter pending';
                    updateCaret();
                }
                return;
            }

            if (e.key === ' ') {
                e.preventDefault();
                if (currentWordIdx < wordList.length - 1) {
                    currentWordIdx++;
                    currentLetterIdx = 0;
                    updateCaret();
                    playCorrectClick();
                }
                return;
            }

            if (e.key.length === 1) {
                keystrokes++;
                if (activeSpan) {
                    const pos = updateCaret();
                    if (e.key === activeWord[currentLetterIdx]) {
                        activeSpan.className = 'letter correct';
                        playCorrectClick();
                        if (pos) spawnParticles(pos.x, pos.y);
                    } else {
                        activeSpan.className = 'letter incorrect';
                        errors++;
                        playErrorThud();
                    }
                    currentLetterIdx++;
                    updateCaret();
                    calculateStats();
                }
            }
        });

        function calculateStats() {
            const mins = (new Date() - startTime) / 60000;
            const wpm = Math.round(((keystrokes - errors) / 5) / mins) || 0;
            const acc = Math.round(((keystrokes - errors) / keystrokes) * 100) || 100;
            document.getElementById('wpm-log').innerText = wpm;
            document.getElementById('accuracy-log').innerText = acc + "%";
        }

        async function endTest() {
            isTestFinished = true;
            clearInterval(timerInterval);
            document.body.classList.remove('is-typing');
            const wpm = document.getElementById('wpm-log').innerText;
            const acc = document.getElementById('accuracy-log').innerText;
            document.getElementById('final-wpm').innerText = wpm;
            document.getElementById('final-accuracy').innerText = acc;
            document.getElementById('modal-overlay').style.display = 'flex';
            if (parseInt(wpm) > bestWPM) {
                bestWPM = parseInt(wpm);
                localStorage.setItem('ishark_best_wpm', bestWPM);
            }
            try {
                await _supabase.from('typing_results').insert([{ student_id: currentUser.email, wpm: parseInt(wpm), accuracy: parseInt(acc) }]);
            } catch (err) {}
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('ishark_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            setTimeout(updateCaret, 200);
        }
        if (localStorage.getItem('ishark_theme') === 'dark') document.documentElement.classList.add('dark');
        loadLesson();
    </script>
</body>
</html>
